    <div class="div">そこで日本海軍は、空母の飛行甲板の後端部分に、赤と白の塗料で縦縞（ストライプ）の塗り分けを施して後端であることを示し、さらにその後端部直前の飛行甲板の左右に、ここが飛行甲板の後端であると確認できるよう小さな張り出し、つまり「耳」を付けたのです。そしてこの「耳」も、状況に応じて赤白の縦縞で塗り分けられました。ちなみに、正式名称は「航空機着艦標識」と言います。</div>
