<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        li {
            list-style: none;
        }

        a {
            text-decoration: none;
        }

        .news {
            margin: 100px auto;
            width: 360px;
            height: 200px;
            /* background-color: pink; */
        }
        .news .head {
            height: 34px;
            background-color: #eee;
            border: 1px solid #dbdee1;
            border-left: 0;
        }

        .news .head a {
            margin-top: -1px;
            display: block;
            border-top: 3px solid #ff8400;
            border-right: 1px solid #dbdee1;
            width: 48px;
            height: 34px;
            background-color: #fff;

            text-align: center;
            line-height: 30px;
            font-size: 14px;
            color: #333;
        }

        ,news .bd {
            padding: 5px;
           
        }

        .news .bd li a {
            font-size: 12px;
            color: #666;
            line-height: 24px;
            padding-left: 20px;
            margin: 10px auto;
        }
        .news .bd li a:hover {
            color: #ff8400;
        }
    </style>
</head>
<body>
    <div class="news">
        <div class="head"><a href="#">新闻</a></div>
        <div class="bd">
            <ul>
                <li><a href="">点赞新农人 温暖的伸手</a></li>
                <li><a href="">在希望的田野上...</a></li>
                <li><a href="">中国天眼又有新发现</a></li>
                <li><a href="">急！这个领域缺人！月入四万还不好招</a></li>
                <li><a href="">G9带货背后 亏损持续扩大</a></li>
                <li><a href="">多地力推二手房有什么好处</a></li>
            </ul>
        </div>
    </div>
</body>
</html>
