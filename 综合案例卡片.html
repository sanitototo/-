<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background-color: #f1f1f1;
        }
        .product {
            margin: 50px auto;
            padding-top: 40px;
            width: 270px;
            height: 253px;
            background-color: #fff;
            text-align: center;
            border-radius: 10px;
        }
        img {
            width: 80px;
            height: auto;
        }

        .product h4 {
            margin-top: 20px;
            margin-bottom: 12px;
            font-size: 18px;
            font-weight: 400;
            color: #333333;
        }
        .product p {
            font-size: 12px;
            color: #555555;
        }
        
    </style>
</head>
<body>
    <div class="product">
    <img src="./模拟案例 商品图片/抖音图标.png" alt="">
    <h4>抖音直播</h4>
    <p>抖音记录美好生活</p>
    </div>
</body>
</html>
