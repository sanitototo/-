<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .box {
            display: flex;
            /* align-items: stretch; */
            /* align-items: center; */
            /* align-items: start; */
            /* align-items: flex-start; */
            align-items: flex-end;
            height: 300px;
            border: 1px solid #000;
        }
        .box div:nth-child(2) {
            align-self: center;
        }
        .box div {
            width: 100px;
            height: 80px;
            background-color: pink;
        }
    </style>
</head>
<body>
    <div class="box">
        <div>1</div>
        <div>2</div>
        <div>3</div>
    </div>
</body>
</html>
