    <h1 class="biaoti">体验消费旺 中国潮玩成外国来华游客新“土特产”</h1>
    <div class="shijian">2026-05-06 20:44 北京 新华社官方账号</div>
    <div><p class="p"><strong class="p">央视网消息：</strong>近期，入境游市场持续升温。在社交媒体上，不少外国游客晒出“中国购”成果，“潮玩手办”成为出镜率极高的“土特产”。在上海南京东路等热门商圈，特意前来选购盲盒、手办的外国顾客络绎不绝。</p>
    <p class="tupian"><img src="./新闻综合案例.webp" alt="" width="900" height="550"></p>
    <p class="p">门店工作人员表示，今年以来，外国顾客数量同比持续上升，目前，外国顾客的消费额占门店消费总额的15%左右。便利政策叠加特色体验，让“沉浸式”潮玩体验消费逐渐成为外国游客“中国购”热门选择。多位外国顾客表示，便利的消费体验与“中国式安全”，正让“去中国旅游”成为一种流行趋势。</p>
