    <h1>各地开展“青年大学习 建功‘十五五’”主题团日活动</h1>
    <ul>
        <li>央视网消息（新闻联播）：5月4日是五四青年节，全国各级共青团组织开展“青年大学习 建功‘十五五’”主题团日活动，继承发扬五四精神，引导广大团员青年奋力书写为中国式现代化挺膺担当的青春篇章。
            <img src="./2026050419383766107 (1).jpg" alt="" title="活动">
        </li>
        <li>连日来，江西、湖北、四川等地举行入团仪式，新团员庄严宣誓，并在重走长征路、红色研学等活动中，汲取奋进力量。在上海、河南、福建等地，青年榜样主题宣讲、话剧等活动丰富多彩，以生动形式讲述党的创新理论和青春奋斗故事。
            <img src="./2026050419373628263.jpg" alt="" title="活动">
        </li>
    </ul>
